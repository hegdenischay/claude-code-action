name: Security Test - Attack PR

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  claude-interaction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Code Action
        uses: ./
        with:
          # Use your OpenRouter API key here
          anthropic_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          claude_args: "--model openrouter/free"
          # Use built-in GITHUB_TOKEN instead of Claude App
          github_token: ${{ github.token }}
          # Force tag mode on PR events
          track_progress: "true"
          # Show full output for debugging
          show_full_output: true
        env:
          # Point to OpenRouter API
          ANTHROPIC_BASE_URL: https://openrouter.ai/api/v1
          # Use a working model
          ANTHROPIC_DEFAULT_SONNET_MODEL: anthropic/claude-3-haiku